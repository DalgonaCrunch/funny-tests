<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심리테스트 - 나를 알아보는 시간</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink: #ff6b9d;
  --purple: #c44dff;
  --blue: #4d79ff;
  --mint: #36d6b5;
  --yellow: #ffc940;
  --orange: #ff8c42;
  --bg: #f5f0ff;
  --card-radius: 20px;
  --btn-radius: 16px;
  --shadow: 0 8px 32px rgba(120, 80, 200, 0.12);
  --shadow-hover: 0 12px 40px rgba(120, 80, 200, 0.22);
}

body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: #333;
  overflow-x: hidden;
}

/* === Animated background blobs === */
.bg-blobs {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-blobs span {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: .3;
}
.bg-blobs span:nth-child(1) { width: 420px; height: 420px; background: #e0c3fc; top: -100px; left: -80px; animation: float1 18s ease-in-out infinite; }
.bg-blobs span:nth-child(2) { width: 360px; height: 360px; background: #fbc2eb; bottom: -60px; right: -60px; animation: float2 22s ease-in-out infinite; }
.bg-blobs span:nth-child(3) { width: 300px; height: 300px; background: #a1c4fd; top: 40%; left: 50%; animation: float3 20s ease-in-out infinite; }

@keyframes float1 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(60px,80px); } }
@keyframes float2 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(-50px,-70px); } }
@keyframes float3 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(-40px,50px); } }

/* === Layout === */
.container {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto; padding: 20px 16px 40px;
}

/* === Header === */
.header {
  text-align: center; padding: 28px 0 12px;
}
.header h1 {
  font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  margin-top: 6px; font-size: 14px; color: #9b8ec4; font-weight: 500;
}

/* === Screen transitions === */
.screen {
  display: none; animation: fadeSlideIn .45s cubic-bezier(.4,0,.2,1) both;
}
.screen.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* === Main page test cards === */
.test-grid {
  display: grid; gap: 16px; margin-top: 20px;
}
.test-card {
  position: relative; border-radius: var(--card-radius); padding: 28px 22px;
  color: #fff; cursor: pointer; overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform .25s, box-shadow .25s;
}
.test-card:hover {
  transform: translateY(-4px); box-shadow: var(--shadow-hover);
}
.test-card::after {
  content: ''; position: absolute; inset: 0; border-radius: var(--card-radius);
  background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 60%);
  pointer-events: none;
}
.test-card .emoji {
  font-size: 48px; display: block; margin-bottom: 12px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.15));
}
.test-card .title {
  font-size: 18px; font-weight: 700; line-height: 1.4;
  text-shadow: 0 1px 3px rgba(0,0,0,.25);
}
.test-card .desc {
  margin-top: 6px; font-size: 13px; opacity: .88; line-height: 1.5;
  text-shadow: 0 1px 2px rgba(0,0,0,.2);
}
.test-card .badge {
  display: inline-block; margin-top: 12px; padding: 4px 14px;
  background: rgba(255,255,255,.25); border-radius: 20px;
  font-size: 12px; font-weight: 700; backdrop-filter: blur(4px);
}

/* Card color themes */
.card-love   { background: linear-gradient(135deg, #ff6b9d, #ff8a65); }
.card-stress { background: linear-gradient(135deg, #7c4dff, #448aff); }
.card-personality { background: linear-gradient(135deg, #26c6da, #66bb6a); }
.card-sunset { background: linear-gradient(135deg, #ff8c42, #ffc940); }
.card-ocean  { background: linear-gradient(135deg, #4d79ff, #36d6b5); }
.card-rose   { background: linear-gradient(135deg, #f093fb, #f5576c); }
.card-forest { background: linear-gradient(135deg, #11998e, #38ef7d); }
.card-night  { background: linear-gradient(135deg, #667eea, #764ba2); }
.card-coral  { background: linear-gradient(135deg, #e8736f, #d4829e); }
.card-sky    { background: linear-gradient(135deg, #6a9fe8, #8bb8d9); }

/* === Test screen === */
.test-header {
  text-align: center; margin-bottom: 20px;
}
.test-header .back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: none; border: none; color: #9b8ec4; font-size: 14px;
  font-weight: 500; cursor: pointer; padding: 8px 0; font-family: inherit;
}
.test-header .back-btn:hover { color: var(--purple); }
.test-header .test-title {
  font-size: 20px; font-weight: 700; margin-top: 4px; color: #4a3878;
}

/* Progress bar */
.progress-wrap {
  margin: 16px 0 8px; position: relative;
}
.progress-bar-bg {
  height: 10px; background: #e8e0f5; border-radius: 10px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 10px;
  background: linear-gradient(90deg, var(--purple), var(--pink));
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.progress-text {
  text-align: right; font-size: 12px; color: #9b8ec4; margin-top: 4px; font-weight: 500;
}

/* Question card */
.question-card {
  background: #fff; border-radius: var(--card-radius); padding: 32px 24px;
  box-shadow: var(--shadow); margin-top: 16px;
  animation: fadeSlideIn .4s cubic-bezier(.4,0,.2,1) both;
}
.question-number {
  display: inline-block; padding: 4px 14px; border-radius: 20px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: #fff; font-size: 12px; font-weight: 700; margin-bottom: 16px;
}
.question-text {
  font-size: 18px; font-weight: 700; line-height: 1.6; color: #2d2252;
  margin-bottom: 24px; word-break: keep-all;
}

/* Choice buttons */
.choices { display: grid; gap: 12px; }
.choice-btn {
  display: block; width: 100%; padding: 16px 20px;
  background: #f8f4ff; border: 2px solid #ece4f8;
  border-radius: var(--btn-radius); cursor: pointer;
  font-size: 15px; font-weight: 500; color: #4a3878;
  text-align: left; line-height: 1.5;
  transition: all .2s; font-family: inherit;
  word-break: keep-all;
}
.choice-btn:hover {
  background: #efe6ff; border-color: var(--purple);
  transform: translateY(-2px); box-shadow: 0 4px 16px rgba(120,80,200,.12);
}
.choice-btn:active {
  transform: scale(.97);
}
.choice-btn.selected {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: #fff; border-color: transparent;
  box-shadow: 0 4px 20px rgba(180,80,200,.25);
}

/* === Result screen === */
.result-card {
  background: #fff; border-radius: var(--card-radius); padding: 36px 24px;
  box-shadow: var(--shadow); text-align: center;
  animation: fadeSlideIn .5s cubic-bezier(.4,0,.2,1) both;
}
.result-emoji {
  font-size: 72px; margin-bottom: 8px;
  animation: bounceIn .6s .2s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes bounceIn {
  from { opacity: 0; transform: scale(.3); }
  to   { opacity: 1; transform: scale(1); }
}
.result-label {
  display: inline-block; padding: 6px 20px; border-radius: 20px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: #fff; font-size: 13px; font-weight: 700; margin-bottom: 16px;
}
.result-type {
  font-size: 26px; font-weight: 900; color: #2d2252; margin-bottom: 8px;
  line-height: 1.4;
}
.result-desc {
  font-size: 15px; color: #6b5b8a; line-height: 1.8; margin-bottom: 24px;
  word-break: keep-all;
}
.result-tags {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
  margin-bottom: 28px;
}
.result-tag {
  padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  background: #f3edff; color: var(--purple);
}

/* Action buttons */
.action-btns { display: grid; gap: 10px; }
.action-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 16px; border-radius: var(--btn-radius);
  font-size: 15px; font-weight: 700; cursor: pointer;
  border: none; font-family: inherit; transition: all .2s;
}
.action-btn:active { transform: scale(.97); }
.btn-save-img {
  background: linear-gradient(135deg, #ff8c42, #ffc940);
  color: #fff; box-shadow: 0 4px 20px rgba(255,140,66,.25);
}
.btn-save-img:hover { box-shadow: 0 6px 28px rgba(255,140,66,.35); }
.btn-share {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: #fff; box-shadow: 0 4px 20px rgba(180,80,200,.25);
}
.btn-share:hover { box-shadow: 0 6px 28px rgba(180,80,200,.35); }
.btn-retry {
  background: #f3edff; color: var(--purple);
}
.btn-retry:hover { background: #e8ddf8; }
.btn-home {
  background: transparent; color: #9b8ec4; border: 2px solid #e8e0f5;
}
.btn-home:hover { background: #f8f4ff; }

/* Result image */
.result-img {
  display: block;
  width: 100%;
  max-width: 400px;
  margin: 0 auto 20px;
  border-radius: 16px;
  box-shadow: 0 6px 24px rgba(120, 80, 200, 0.18);
}

/* Share Bottom Sheet */
.share-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.share-overlay.show { opacity: 1; pointer-events: auto; }
.share-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
  background: #fff; border-radius: 24px 24px 0 0; padding: 20px 20px 32px;
  transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
  max-width: 520px; margin: 0 auto;
}
.share-overlay.show .share-sheet { transform: translateY(0); }
.share-sheet-handle {
  width: 40px; height: 4px; background: #ddd; border-radius: 4px;
  margin: 0 auto 16px;
}
.share-sheet h3 {
  font-size: 17px; font-weight: 700; color: #2d2252; margin-bottom: 16px; text-align: center;
}
.share-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;
}
.share-item {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 12px 4px; border-radius: 16px; cursor: pointer; border: none;
  background: transparent; font-family: inherit; transition: background .2s;
}
.share-item:hover { background: #f5f0ff; }
.share-item:active { transform: scale(.95); }
.share-icon {
  width: 48px; height: 48px; border-radius: 14px; display: flex;
  align-items: center; justify-content: center; font-size: 24px;
}
.share-icon.kakao { background: #FEE500; }
.share-icon.twitter { background: #1DA1F2; color: #fff; }
.share-icon.facebook { background: #1877F2; color: #fff; }
.share-icon.line { background: #06C755; color: #fff; }
.share-item span { font-size: 12px; font-weight: 600; color: #666; }
.share-url-box {
  display: flex; gap: 8px; margin-top: 4px;
}
.share-url-input {
  flex: 1; padding: 12px 16px; border: 2px solid #e8e0f5; border-radius: 12px;
  font-size: 13px; color: #666; background: #f8f4ff; font-family: inherit;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.share-url-copy {
  padding: 12px 20px; border: none; border-radius: 12px; font-weight: 700;
  font-size: 13px; cursor: pointer; font-family: inherit;
  background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff;
  white-space: nowrap;
}
.share-url-copy:active { transform: scale(.95); }

/* Toast */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #333; color: #fff; padding: 14px 28px; border-radius: 14px;
  font-size: 14px; font-weight: 600; z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .35s;
  opacity: 0; pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0); opacity: 1;
}

/* Footer */
.footer {
  text-align: center; margin-top: 40px; padding-bottom: 20px;
  font-size: 12px; color: #bbb;
}

/* Confetti canvas */
#confetti {
  position: fixed; inset: 0; z-index: 50; pointer-events: none;
}
</style>
</head>
<body>

<div class="bg-blobs"><span></span><span></span><span></span></div>

<div class="container">
  <div class="header" style="position:relative;">

    <p>나를 알아보는 재미있는 시간</p>
    <a href="admin.html" style="position:absolute;top:28px;right:0;color:#c4b5dc;font-size:22px;text-decoration:none;padding:4px 8px;" title="관리자">⚙️</a>
  </div>

  <!-- Main Screen -->
  <div id="screen-main" class="screen active">

  <!-- Test Screen -->
  <div id="screen-test" class="screen">
    <div class="test-header">

  <!-- Result Screen -->

</div>

<!-- Share Bottom Sheet -->
<div class="share-overlay" id="share-overlay" onclick="closeShareSheet()">

      <button class="share-item" onclick="shareToLine()">
        <div class="share-icon line">💚</div>

      </button>
    </div>
    <div class="share-url-box">
      <input type="text" class="share-url-input" id="share-url-input" readonly />
      <button class="share-url-copy" onclick="copyShareUrl()">URL 복사</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="confetti"></canvas>

  N: { gradient: ['#fdcb6e', '#ffe4a0'], accent: '#e17055', text: '#b35640' },
  O: { gradient: ['#6c5ce7', '#a29bfe'], accent: '#6c5ce7', text: '#4834d4' },
  P: { gradient: ['#ff7675', '#ffb3b3'], accent: '#d63031', text: '#a82525' },
  Q: { gradient: ['#00cec9', '#81ecec'], accent: '#00b5ad', text: '#008c85' },
  R: { gradient: ['#e056a0', '#f3a4cc'], accent: '#e056a0', text: '#a83d74' },
  S: { gradient: ['#78e08f', '#b8e6c4'], accent: '#38ada9', text: '#267d7a' },
  T: { gradient: ['#f8a5c2', '#f7c5d5'], accent: '#f78fb3', text: '#b5446e' },
};
function getColorScheme(type) {
  return RESULT_COLOR_SCHEMES[type] || { gradient: ['#c3aed6', '#e8d5f5'], accent: '#a855f7', text: '#6b21a8' };
}

// ──────────────────────────────────────────────
//  SEEDED RANDOM (consistent decorations)
// ──────────────────────────────────────────────
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// ──────────────────────────────────────────────
//  CANVAS RESULT IMAGE GENERATOR
// ──────────────────────────────────────────────
function generateResultImage(emoji, typeName, testTitle, colorScheme) {
  const W = 600, H = 400;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // --- Pastel gradient background ---
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, colorScheme.gradient[0]);
  grad.addColorStop(1, colorScheme.gradient[1]);
  ctx.fillStyle = grad;

  // Rounded rect background
  const r = 24;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(W - r, 0); ctx.quadraticCurveTo(W, 0, W, r);
  ctx.lineTo(W, H - r); ctx.quadraticCurveTo(W, H, W - r, H);
  ctx.lineTo(r, H); ctx.quadraticCurveTo(0, H, 0, H - r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
  ctx.save();
  ctx.clip();

  // --- Soft circular highlights ---
  ctx.globalAlpha = 0.18;
  const circle1 = ctx.createRadialGradient(120, 80, 0, 120, 80, 180);
  circle1.addColorStop(0, '#ffffff');
  circle1.addColorStop(1, 'transparent');
  ctx.fillStyle = circle1;
  ctx.fillRect(0, 0, W, H);

  const circle2 = ctx.createRadialGradient(480, 320, 0, 480, 320, 160);
  circle2.addColorStop(0, '#ffffff');
  circle2.addColorStop(1, 'transparent');
  ctx.fillStyle = circle2;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1.0;

  // --- Decorative elements (stars, hearts, sparkles) ---
  const rng = seededRandom(42);
  const decoColors = [colorScheme.accent, '#ffb6c1', '#ffe066', '#b19cd9', '#90e0ef'];

  // Draw small stars
  function drawStar(cx, cy, size, color) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](Math.cos(angle) * size, Math.sin(angle) * size);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Draw small hearts
  function drawHeart(cx, cy, size, color) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.moveTo(0, size * 0.3);
    ctx.bezierCurveTo(-size, -size * 0.5, -size * 0.5, -size * 1.2, 0, -size * 0.5);
    ctx.bezierCurveTo(size * 0.5, -size * 1.2, size, -size * 0.5, 0, size * 0.3);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Draw sparkle (4-pointed star)
  function drawSparkle(cx, cy, size, color) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    const pts = 4;
    for (let i = 0; i < pts * 2; i++) {
      const angle = (i * Math.PI) / pts - Math.PI / 2;
      const rad = i % 2 === 0 ? size : size * 0.3;
      ctx.lineTo(Math.cos(angle) * rad, Math.sin(angle) * rad);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Scatter decorations
  for (let i = 0; i < 18; i++) {
    const x = rng() * W;
    const y = rng() * H;
    const size = rng() * 10 + 5;
    const color = decoColors[Math.floor(rng() * decoColors.length)];
    const shape = Math.floor(rng() * 3);
    if (shape === 0) drawStar(x, y, size, color);
    else if (shape === 1) drawHeart(x, y, size, color);
    else drawSparkle(x, y, size, color);
  }

  // --- Small dots scattered ---
  ctx.globalAlpha = 0.2;
  for (let i = 0; i < 30; i++) {
    const x = rng() * W;
    const y = rng() * H;
    const rad = rng() * 3 + 1;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fillStyle = decoColors[Math.floor(rng() * decoColors.length)];
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // --- Test title (top) ---
  ctx.font = '600 18px "Noto Sans KR", sans-serif';
  ctx.fillStyle = colorScheme.text;
  ctx.globalAlpha = 0.7;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(testTitle, W / 2, 28);
  ctx.globalAlpha = 1;

  // --- Emoji (large, center-top) ---
  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, W / 2, 140);

  // --- Type name (bold, below emoji) ---
  ctx.font = '900 30px "Noto Sans KR", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // Text shadow for readability
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillText(typeName, W / 2 + 1, 201);
  ctx.fillStyle = colorScheme.text;
  ctx.shadowColor = 'rgba(0,0,0,0.1)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 2;
  ctx.fillText(typeName, W / 2, 200);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // --- Decorative line under type name ---
  const textWidth = ctx.measureText(typeName).width;
  const lineGrad = ctx.createLinearGradient(W / 2 - textWidth / 2, 0, W / 2 + textWidth / 2, 0);
  lineGrad.addColorStop(0, 'transparent');
  lineGrad.addColorStop(0.2, colorScheme.accent);
  lineGrad.addColorStop(0.8, colorScheme.accent);
  lineGrad.addColorStop(1, 'transparent');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(W / 2 - textWidth / 2 - 10, 242);
  ctx.lineTo(W / 2 + textWidth / 2 + 10, 242);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // --- Subtitle / tagline area ---
  ctx.font = '500 14px "Noto Sans KR", sans-serif';
  ctx.fillStyle = colorScheme.text;
  ctx.globalAlpha = 0.55;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('심리테스트 결과', W / 2, 260);
  ctx.globalAlpha = 1;

  // --- Bottom decorative wave ---
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = colorScheme.accent;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 1) {
    const y = H - 50 + Math.sin(x * 0.02) * 15 + Math.sin(x * 0.005) * 20;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // --- Watermark ---
  ctx.font = '500 12px "Noto Sans KR", sans-serif';
  ctx.fillStyle = colorScheme.text;
  ctx.globalAlpha = 0.3;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('심리테스트 - 나를 알아보는 시간', W / 2, H - 16);
  ctx.globalAlpha = 1;

  ctx.restore();

  return canvas.toDataURL('image/png');
}

// ──────────────────────────────────────────────
//  SCREEN MANAGEMENT
// ──────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  // re-trigger animation
  target.style.animation = 'none';
  target.offsetHeight; // reflow
  target.style.animation = '';
  target.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ──────────────────────────────────────────────
//  LOAD TESTS FROM SERVER + BUILT-IN
// ──────────────────────────────────────────────
let serverTests = [];
let inactiveIds = [];

async function fetchServerData() {
  try {
    const [testsRes, inactiveRes] = await Promise.all([
      fetch('/api/tests').then(r => r.json()).catch(() => []),
      fetch('/api/inactive').then(r => r.json()).catch(() => [])
    ]);
    serverTests = testsRes || [];
    inactiveIds = inactiveRes || [];
  } catch (e) {
    serverTests = [];
    inactiveIds = [];
  }
}

function loadAllTests() {
  const allTests = [...TESTS, ...serverTests];
  return allTests.filter(t => !inactiveIds.includes(t.id));
}

// ──────────────────────────────────────────────
//  RENDER MAIN PAGE
// ──────────────────────────────────────────────
function renderMain() {
  const activeTests = loadAllTests();
  const grid = document.getElementById('test-grid');
  grid.innerHTML = activeTests.map((t, i) => `
    <div class="test-card ${t.cardClass || ''}" style="background:${t.cardGradient || ''};animation-delay:${i * .08}s" onclick="startTestById('${t.id}')">
      <span class="emoji">${t.emoji}</span>
      <div class="title">${t.title}</div>
      <div class="desc">${t.desc}</div>
      <span class="badge">${t.badge} · ${t.questions.length}문항</span>
    </div>
  `).join('');
}

function startTestById(id) {
  const allTests = loadAllTests();
  const test = allTests.find(t => t.id === id);
  if (!test) return;
  currentTest = test;
  currentQuestion = 0;
  answers = [];
  // 메인 질문 셔플 + 예비문항은 별도 보관
  activeQuestions = [...test.questions].sort(() => Math.random() - 0.5);
  if (test.reserveQuestions && test.reserveQuestions.length > 0) {
    // 예비문항은 뒤에 대기 (필요할 때 삽입)
    currentTest._reserves = [...test.reserveQuestions].sort(() => Math.random() - 0.5);
  } else {
    currentTest._reserves = [];
  }
  document.getElementById('test-title-display').textContent = currentTest.title;
  showScreen('screen-test');
  renderQuestion();
}

// startTest by index (kept for backward compat)
function startTest(index) {
  const allTests = loadAllTests();
  if (allTests[index]) startTestById(allTests[index].id);
}

// ──────────────────────────────────────────────
//  RENDER QUESTION
// ──────────────────────────────────────────────
let shuffledChoices = [];

function renderQuestion() {
  const q = activeQuestions[currentQuestion];
  const total = activeQuestions.length;
  const pct = ((currentQuestion) / total) * 100;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentQuestion + 1} / ${total}`;

  // 선택지 순서 랜덤 셔플
  shuffledChoices = [...q.choices].sort(() => Math.random() - 0.5);

  const area = document.getElementById('question-area');
  area.innerHTML = `
    <div class="question-card">
      <span class="question-number">Q${currentQuestion + 1}</span>
      <div class="question-text">${q.text}</div>
      <div class="choices">
        ${shuffledChoices.map((c, i) => `
          <button class="choice-btn" onclick="selectChoice(${i})">${c.text}</button>
        `).join('')}
      </div>
    </div>
  `;
}

// 동점 감지 → 예비문항 삽입
function checkAndInsertTiebreaker() {
  if (!currentTest._reserves || currentTest._reserves.length === 0) return;
  const remaining = activeQuestions.length - currentQuestion;
  if (remaining > 1) return;  // 마지막 문항 직전에만 체크
  const counts = {};
  answers.forEach(a => counts[a] = (counts[a] || 0) + 1);
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  if (sorted.length >= 2 && sorted[0][1] === sorted[1][1]) {
    // 동점! 예비문항 추가
    const tiedTypes = sorted.filter(e => e[1] === sorted[0][1]).map(e => e[0]);
    // 동점 유형을 포함하는 예비문항 우선
    let bestIdx = currentTest._reserves.findIndex(q =>
      q.choices.some(c => tiedTypes.includes(c.type))
    );
    if (bestIdx === -1) bestIdx = 0;
    const extra = currentTest._reserves.splice(bestIdx, 1)[0];
    activeQuestions.push(extra);
  }
}

// ──────────────────────────────────────────────
//  SELECT CHOICE
// ──────────────────────────────────────────────
function selectChoice(index) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  btns[index].classList.add('selected');

  const choice = shuffledChoices[index];
  answers.push(choice.type);

  setTimeout(() => {
    currentQuestion++;
    checkAndInsertTiebreaker();
    if (currentQuestion >= activeQuestions.length) {
      // fill progress to 100%
      document.getElementById('progress-fill').style.width = '100%';
      setTimeout(() => showResult(), 350);
    } else {
      renderQuestion();
    }
  }, 400);
}

// ──────────────────────────────────────────────
//  CALCULATE & SHOW RESULT
// ──────────────────────────────────────────────
let currentResultType = null;

function showResult(forceTestId, forceType) {
  let testObj = currentTest;
  let maxType;

  if (forceTestId && forceType) {
    const allTests = loadAllTests();
    testObj = allTests.find(t => t.id === forceTestId);
    if (!testObj || !testObj.results[forceType]) { goHome(); return; }
    maxType = forceType;
    currentTest = testObj;
  } else {
    const counts = {};
    answers.forEach(a => counts[a] = (counts[a] || 0) + 1);
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    // 동점 시 랜덤 선택
    const maxScore = sorted[0][1];
    const tied = sorted.filter(e => e[1] === maxScore);
    maxType = tied[Math.floor(Math.random() * tied.length)][0];
    // results에 해당 type이 없으면 첫 번째 결과 사용
    if (!testObj.results[maxType]) {
      maxType = Object.keys(testObj.results)[0];
    }
  }

  currentResultType = maxType;
  const result = testObj.results[maxType];
  if (!result) { goHome(); return; }
  currentResultText = result.type;
  const colorScheme = getColorScheme(maxType);

  // Generate the canvas result image
  generatedImageDataUrl = generateResultImage(result.emoji, result.type, testObj.title, colorScheme);

  // Update URL with result params (without reload)
  const shareUrl = `${location.origin}${location.pathname}?test=${testObj.id}&result=${maxType}`;
  history.replaceState(null, '', `?test=${testObj.id}&result=${maxType}`);

  const card = document.getElementById('result-card');
  card.innerHTML = `
    <div id="result-capture" style="text-align:center;">
      <img src="${generatedImageDataUrl}" alt="${result.type}" class="result-img" />
      <div class="result-desc">${result.desc}</div>
      <div class="result-tags">
        ${result.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}
      </div>
    </div>
    <div class="action-btns" style="margin-top:20px;">
      <button class="action-btn btn-save-img" onclick="saveResultImage()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        이미지 저장
      </button>
      <button class="action-btn btn-share" onclick="shareResult()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        결과 공유하기
      </button>
      <button class="action-btn btn-retry" onclick="retryTest()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        다시하기
      </button>
      <button class="action-btn btn-home" onclick="goHome()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        목록으로
      </button>
    </div>
  `;

  showScreen('screen-result');
  if (!forceTestId) launchConfetti();
}

// ──────────────────────────────────────────────
//  ACTIONS
// ──────────────────────────────────────────────
function saveResultImage() {
  if (!generatedImageDataUrl) {
    showToast('이미지가 없어요 😢');
    return;
  }
  const link = document.createElement('a');
  link.download = `${currentTest.title}_결과.png`;
  link.href = generatedImageDataUrl;
  link.click();
  showToast('이미지가 저장되었어요! 🖼️');
}

let currentResultText = '';

function getShareUrl() {
  return `${location.origin}${location.pathname}?test=${currentTest.id}&result=${currentResultType}`;
}

function getShareText() {
  return `[${currentTest.title}] 나의 결과: ${currentResultText}\n나도 테스트 해보기!`;
}

function shareResult() {
  const url = getShareUrl();
  document.getElementById('share-url-input').value = url;
  document.getElementById('share-overlay').classList.add('show');
}

function closeShareSheet() {
  document.getElementById('share-overlay').classList.remove('show');
}

function shareNative() {
  const url = getShareUrl();
  const text = getShareText();
  if (navigator.share) {
    navigator.share({ title: currentTest.title, text: text, url: url })
      .then(() => closeShareSheet()).catch(() => {});
  } else {
    // PC 브라우저 fallback: URL 복사
    copyShareUrl();
  }
}

function shareToTwitter() {
  const url = getShareUrl();
  const text = getShareText();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank', 'width=600,height=400');
  closeShareSheet();
}

function shareToFacebook() {
  const url = getShareUrl();
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank', 'width=600,height=400');
  closeShareSheet();
}

function shareToLine() {
  const url = getShareUrl();
  const text = getShareText();
  const lineUrl = `https://line.me/R/share?text=${encodeURIComponent(text + '\n' + url)}`;
  window.open(lineUrl, '_blank', 'width=600,height=400');
  closeShareSheet();
}

function copyShareUrl() {
  const url = getShareUrl();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      showToast('URL이 복사되었어요! 📋');
      closeShareSheet();
    }).catch(() => fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  showToast('URL이 복사되었어요! 📋');
  closeShareSheet();
}

function retryTest() {
  const idx = TESTS.indexOf(currentTest);
  startTest(idx);
}

function goHome() {
  currentTest = null;
  currentResultType = null;
  generatedImageDataUrl = null;
  history.replaceState(null, '', location.pathname);
  showScreen('screen-main');
}

//  TOAST
// ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ──────────────────────────────────────────────
//  CONFETTI 🎉
// ──────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#ff6b9d','#c44dff','#4d79ff','#36d6b5','#ffc940','#ff8c42','#f06292','#ba68c8','#64b5f6'];
  const pieces = [];
  for (let i = 0; i < 100; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: Math.random() * 3 + 2,
      vx: (Math.random() - .5) * 2,
      rot: Math.random() * 360,
      rv: (Math.random() - .5) * 8,
      opacity: 1
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      if (p.opacity <= 0) return;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.rot += p.rv;
      if (frame > 60) p.opacity -= 0.008;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
(async function init() {
  await fetchServerData();
  renderMain();

  // Check URL params for shared result
  const params = new URLSearchParams(location.search);
  const testId = params.get('test');
  const resultType = params.get('result');
  if (testId && resultType) {
    showResult(testId, resultType);
  }
})();
</script>
